name: PR Quality Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # Check PR size to encourage small, focused PRs
  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        id: pr_size
        run: |
          # Get the number of changed lines
          git fetch origin ${{ github.base_ref }}:base
          CHANGED_LINES=$(git diff --numstat base ${{ github.head_ref }} | awk '{sum+=$1+$2} END {print sum}')
          echo "changed_lines=$CHANGED_LINES" >> $GITHUB_OUTPUT

          if [ "$CHANGED_LINES" -gt 500 ]; then
            echo "::warning::PR is quite large ($CHANGED_LINES lines changed). Consider breaking it into smaller PRs."
            echo "large_pr=true" >> $GITHUB_OUTPUT
          else
            echo "large_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on large PR
        if: steps.pr_size.outputs.large_pr == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const changedLines = '${{ steps.pr_size.outputs.changed_lines }}';
            const message = `⚠️ **Large PR Warning**\n\nThis PR contains ${changedLines} lines of changes. Consider breaking it down into smaller, more focused PRs for easier review.\n\n[Best practices for PR size](https://github.com/google/eng-practices/blob/master/review/developer/small-cls.md)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  # Check for common issues in PR
  pr-content-check:
    name: PR Content Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check PR title format
        uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.pull_request.title;
            const validPrefixes = ['feat:', 'fix:', 'docs:', 'style:', 'refactor:', 'test:', 'chore:', 'perf:', 'ci:'];
            const hasValidPrefix = validPrefixes.some(prefix => title.toLowerCase().startsWith(prefix));

            if (!hasValidPrefix) {
              const message = `⚠️ **PR Title Format**\n\nConsider using a conventional commit prefix in your PR title:\n- feat: new feature\n- fix: bug fix\n- docs: documentation\n- style: formatting\n- refactor: code restructuring\n- test: tests\n- chore: maintenance\n- perf: performance\n- ci: CI/CD changes`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
            }

  # Run npm audit to check for vulnerabilities
  security-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Run npm audit
        run: |
          npm audit --audit-level=high || true
