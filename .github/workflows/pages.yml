name: Deploy GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'site/**'
      - 'docs/**'
      - 'index.html'
      - 'vite.config.ts'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Step 1: Build Vite app (into a temp dir to not interfere with site build)
      - name: Build demo assets with Vite
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      # Step 2: Backup the build assets
      - name: Backup Vite assets
        run: |
          mkdir -p /tmp/vite-assets
          cp -r dist/* /tmp/vite-assets/
          ls -la /tmp/vite-assets/

      # Step 3: Clean dist and build site structure
      - name: Build site structure
        run: |
          rm -rf dist
          node site/scripts/build-site.ts
        env:
          FORCE_COLOR: 1

      # Step 4: Restore Vite assets to demo folder
      - name: Copy demo assets
        run: |
          # Create demo assets dir
          mkdir -p dist/demo/assets

          # Copy compiled JS files from vite build
          if [ -f /tmp/vite-assets/assets/index-*.js ]; then
            cp /tmp/vite-assets/assets/index-*.js dist/demo/assets/
          fi

          # List what we have
          echo "Demo assets:"
          ls -la dist/demo/assets/

          # Update demo.html to reference the correct JS file
          # Find the JS file and update the reference
          JS_FILE=$(ls dist/demo/assets/index-*.js 2>/dev/null | head -1 | xargs basename)
          if [ -n "$JS_FILE" ]; then
            echo "Found JS file: $JS_FILE"
            # Update the script src in demo.html
            sed -i "s|/demo/main.js|/demo/assets/$JS_FILE|g" dist/demo/index.html
          fi

          # Verify final structure
          echo "Final dist structure:"
          find dist -type f | sort

      # Step 5: Add .nojekyll
      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
